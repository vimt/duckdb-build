name: Build DuckDB Static Libraries

on:
  push:
  workflow_dispatch:
    inputs:
      duckdb_version:
        description: 'DuckDB version (branch/tag/SHA)'
        default: 'main'
      create_release:
        description: 'Create a GitHub release'
        type: boolean
        default: false

env:
  DUCKDB_VERSION: ${{ inputs.duckdb_version || 'main' }}
  VCPKG_COMMIT: 'ce613c41372b23b1f51333815feb3edd87ef8a8b'

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            os: ubuntu-24.04
            vcpkg_triplet: x64-linux-release
          - platform: linux-arm64
            os: ubuntu-24.04-arm
            vcpkg_triplet: arm64-linux-release
          - platform: darwin-arm64
            os: macos-latest
            osx_build_arch: arm64
            vcpkg_triplet: arm64-osx-release
          - platform: darwin-amd64
            os: macos-latest
            osx_build_arch: x86_64
            vcpkg_triplet: x64-osx-release

    steps:
      - uses: actions/checkout@v4

      - name: Checkout DuckDB
        uses: actions/checkout@v4
        with:
          repository: duckdb/duckdb
          ref: ${{ env.DUCKDB_VERSION }}
          path: duckdb

      - name: Checkout duckdb-mysql-sharding
        uses: actions/checkout@v4
        with:
          repository: vimt/duckdb-mysql-sharding
          path: duckdb-mysql-sharding
          submodules: recursive

      - name: Apply shell library patch
        run: |
          cd duckdb
          git apply ../patches/shell_lib.patch
          echo "=== Patch applied ==="
          ls -la tools/shell/shell_lib.cpp tools/shell/include/shell_lib.h

      - name: Setup (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Setup (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg-repo
          cd vcpkg-repo
          git checkout ${{ env.VCPKG_COMMIT }}
          ./bootstrap-vcpkg.sh

      - name: Build DuckDB + shell library
        env:
          GEN: ninja
          VCPKG_TOOLCHAIN_PATH: ${{ github.workspace }}/vcpkg-repo/scripts/buildsystems/vcpkg.cmake
          VCPKG_TARGET_TRIPLET: ${{ matrix.vcpkg_triplet }}
          OSX_BUILD_ARCH: ${{ matrix.osx_build_arch }}
        run: |
          WORKSPACE="${{ github.workspace }}"

          COMMON_FLAGS="-G Ninja"
          COMMON_FLAGS="${COMMON_FLAGS} -DDUCKDB_EXTENSION_CONFIGS='${WORKSPACE}/extension_config.cmake'"
          COMMON_FLAGS="${COMMON_FLAGS} -DVCPKG_BUILD=1"
          COMMON_FLAGS="${COMMON_FLAGS} -DCMAKE_TOOLCHAIN_FILE='${VCPKG_TOOLCHAIN_PATH}'"
          COMMON_FLAGS="${COMMON_FLAGS} -DVCPKG_TARGET_TRIPLET='${VCPKG_TARGET_TRIPLET}'"
          COMMON_FLAGS="${COMMON_FLAGS} -DVCPKG_MANIFEST_DIR='${WORKSPACE}'"
          COMMON_FLAGS="${COMMON_FLAGS} -DBUILD_SHELL_LIB=1"

          # Only set OVERRIDE_GIT_DESCRIBE for version tags (vX.Y.Z format)
          if [[ "${{ env.DUCKDB_VERSION }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            COMMON_FLAGS="${COMMON_FLAGS} -DOVERRIDE_GIT_DESCRIBE='${{ env.DUCKDB_VERSION }}'"
          fi

          if [ -n "${OSX_BUILD_ARCH}" ]; then
            COMMON_FLAGS="${COMMON_FLAGS} -DOSX_BUILD_ARCH=${OSX_BUILD_ARCH}"
          fi

          # Step 1: Extension config build to merge vcpkg manifests
          echo "=== Step 1: Merging vcpkg manifests ==="
          cmake ${COMMON_FLAGS} \
            -DEXTENSION_CONFIG_BUILD=TRUE \
            -DCMAKE_BUILD_TYPE=Debug \
            -S duckdb -B duckdb/build/extension_configuration
          cmake --build duckdb/build/extension_configuration

          # Step 2: Build DuckDB with merged manifest + shell library
          echo "=== Step 2: Building DuckDB + shell library ==="
          cmake ${COMMON_FLAGS} \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHELL=1 \
            -DBUILD_UNITTESTS=0 \
            -DENABLE_UBSAN=0 \
            -S duckdb -B duckdb/build/release
          cmake --build duckdb/build/release --config Release -- -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Merge into single static library
        run: |
          mkdir -p merge_tmp dist

          # Collect all .a files
          find duckdb/build/release/src -name "libduckdb_static.a" -exec cp {} merge_tmp/ \;
          find duckdb/build/release/extension -name "lib*_extension.a" -exec cp {} merge_tmp/ \;
          find duckdb/build/release/third_party -name "libduckdb_*.a" -exec cp {} merge_tmp/ \;

          # Shell library (built by CMake target duckdb_shell_lib)
          find duckdb/build/release/tools/shell -name "libduckdb_shell_lib.a" -exec cp {} merge_tmp/ \;

          # Linenoise (needed by shell)
          find duckdb/build/release/tools/shell -name "lib*linenoise*.a" -exec cp {} merge_tmp/ \;

          VCPKG_LIB="duckdb/build/release/vcpkg_installed/${{ matrix.vcpkg_triplet }}/lib"
          if [ -d "${VCPKG_LIB}" ]; then
            cp "${VCPKG_LIB}"/*.a merge_tmp/ 2>/dev/null || true
          fi

          echo "=== Libraries to merge ==="
          ls -lhS merge_tmp/*.a

          # Merge all .a into single libduckdb_bundle.a
          if [ "${{ runner.os }}" = "macOS" ]; then
            libtool -static -o dist/libduckdb_bundle.a merge_tmp/*.a
          else
            {
              echo "CREATE dist/libduckdb_bundle.a"
              for f in merge_tmp/*.a; do
                echo "ADDLIB $f"
              done
              echo "SAVE"
              echo "END"
            } | ar -M
          fi

          # Copy headers
          cp duckdb/src/include/duckdb.h dist/
          cp duckdb/tools/shell/include/shell_lib.h dist/duckdb_shell_lib.h

          echo ""
          echo "=== Bundle result ==="
          ls -lh dist/

      - name: Create zip
        run: |
          cd dist
          zip -r ../duckdb-${{ matrix.platform }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: duckdb-${{ matrix.platform }}
          path: duckdb-${{ matrix.platform }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: ${{ inputs.create_release == true }}
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.duckdb_version || 'main' }}
          name: DuckDB ${{ inputs.duckdb_version || 'main' }} with Extensions
          files: "*.zip"
          generate_release_notes: true
